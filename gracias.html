<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta enviada | Aitor Soluciones</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0b2545" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <style>
    :root {
      --navy: #0b2545;
      --orange: #f57c00;
      --orange-2: #ff9b27;
      --white: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(255, 155, 39, 0.12), transparent 30%),
        linear-gradient(135deg, var(--navy) 0%, #081c35 100%);
      color: var(--white);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }
    .box {
      max-width: 560px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 40px 32px;
    }
    img { width: 220px; max-width: 80%; margin: 0 auto 22px; display: block; }
    h1 { font-size: clamp(1.7rem, 4vw, 2.4rem); line-height: 1.15; margin: 0 0 14px; }
    h1 span { color: var(--orange-2); }
    p { color: rgba(255,255,255,.85); margin: 0 0 24px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      margin: 4px;
    }
    .btn-primary { background: var(--orange); color: var(--white); }
    .btn-primary:hover { background: var(--orange-2); }
    .btn-secondary { color: var(--white); border: 1px solid rgba(255,255,255,.25); }
  </style>
</head>
<body>
  <div class="box">
    <img src="assets/logo-white.webp" alt="Aitor Soluciones" width="640" height="427" />
    <h1>¡Consulta enviada! <span>Te responderé lo antes posible.</span></h1>
    <p>Ya tengo tu mensaje. Si quieres agilizar, mándame fotos del trabajo por WhatsApp y te doy una orientación más rápida.</p>
    <a class="btn btn-primary" href="https://wa.me/34603207780?text=Hola%20Aitor,%20te%20acabo%20de%20enviar%20una%20consulta%20desde%20la%20web.%20Te%20paso%20fotos." target="_blank" rel="noopener">Enviar fotos por WhatsApp</a>
    <a class="btn btn-secondary" href="/">Volver a la web</a>
  </div>
</body>
</html>
